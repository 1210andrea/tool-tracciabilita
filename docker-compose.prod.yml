services:
  nginx:
    env_file:
      - .env
    build: ./nginx
    container_name: machines_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always
    networks:
      - machines_network

  frontend:
    env_file:
      - .env
    build:
      context: ./frontend
      args:
        - VITE_API_URL=https://your-domain.com/api
    container_name: machines_frontend
    environment:
      - NODE_ENV=production
    restart: always
    networks:
      - machines_network

  backend:
    env_file:
      - .env
    build: ./backend
    container_name: machines_backend
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgres://$DB_USER:$DB_PASSWORD@postgres:5432/machines_db
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=$JWT_SECRET
      - JWT_REFRESH_SECRET=$JWT_REFRESH_SECRET
      - JWT_EXPIRY=$JWT_EXPIRY
      - JWT_REFRESH_EXPIRY=$JWT_REFRESH_EXPIRY
      - AI_PROVIDER=ollama
      - AI_API_URL=$AI_API_URL
      - AI_TIMEOUT=$AI_TIMEOUT
      - LOG_LEVEL=$LOG_LEVEL
      - CORS_ORIGIN=$CORS_ORIGIN
      - LDAP_ENABLED=$LDAP_ENABLED
      - LDAP_SERVER=$LDAP_SERVER
      - LDAP_BASE_DN=$LDAP_BASE_DN
    depends_on:
      - postgres
      - redis
      - ollama
    restart: always
    networks:
      - machines_network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    env_file:
      - .env
    image: postgres:15-alpine
    container_name: machines_postgres
    environment:
      POSTGRES_DB: machines_db
      POSTGRES_USER: $DB_USER
      POSTGRES_PASSWORD: $DB_PASSWORD
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./backups:/backups
    restart: always
    networks:
      - machines_network

  redis:
    image: redis:7-alpine
    container_name: machines_redis
    restart: always
    networks:
      - machines_network

  ollama:
    env_file:
      - .env
    image: ollama/ollama:latest
    container_name: machines_ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: always
    networks:
      - machines_network

volumes:
  postgres_data:
  ollama_data:

networks:
  machines_network:
    driver: bridge

