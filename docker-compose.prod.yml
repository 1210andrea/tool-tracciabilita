services:
  nginx:
    env_file:
      - .env
    build: ./nginx
    container_name: machines_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_started
    restart: always
    networks:
      - machines_network

  frontend:
    env_file:
      - .env
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
    container_name: machines_frontend
    restart: always
    networks:
      - machines_network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    env_file:
      - .env
    build: ./backend
    container_name: machines_backend
    environment:
      NODE_ENV: production
      PORT: 3001
    restart: always
    networks:
      - machines_network
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres:
    env_file:
      - .env
    image: postgres:15-alpine
    container_name: machines_postgres
    environment:
      POSTGRES_DB: machines_db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./backups:/backups
    restart: always
    networks:
      - machines_network

  redis:
    image: redis:7-alpine
    container_name: machines_redis
    restart: always
    networks:
      - machines_network

  ollama:
    env_file:
      - .env
    image: ollama/ollama:latest
    container_name: machines_ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: always
    networks:
      - machines_network

volumes:
  postgres_data:
  ollama_data:

networks:
  machines_network:
    driver: bridge
